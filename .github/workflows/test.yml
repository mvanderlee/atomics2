name: test

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  # same job the release runs, so cross-compile and packaging breakage
  # (win32-arm64, macOS universal2, musllinux) surfaces on PRs
  build-wheels:
    uses: ./.github/workflows/_reusable-build-wheels.yml

  test-native:
    name: ${{ matrix.os }} / py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # windows-latest is amd64, macos-15 is arm64, ubuntu-latest is x86_64
        os: [ubuntu-latest, windows-latest, macos-15]
        python: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7
        with:
          # full history and tags so setuptools-scm can derive the version
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      # a cached lib in _clib makes build_patomic skip the clone and C build;
      # setup.py contains the pinned patomic tag, so the key rolls over on upgrades
      - name: Cache patomic library
        uses: actions/cache@v6
        with:
          path: src/atomics2/_clib
          key: patomic-${{ matrix.os }}-${{ hashFiles('setup.py') }}

      - name: Install package (clones and builds patomic)
        run: python -m pip install . pytest

      - name: Run tests
        run: python -m pytest tests -q

  test-emulated:
    name: linux-${{ matrix.arch }} (qemu)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: i686
            platform: i386
          - arch: aarch64
            platform: aarch64
          - arch: ppc64le
            platform: ppc64le
          - arch: s390x
            platform: s390x
    steps:
      - uses: actions/checkout@v7
        with:
          # full history and tags so setuptools-scm can derive the version
          fetch-depth: 0
      - uses: actions/setup-python@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: ${{ matrix.platform }}

      # a cached lib in _clib makes build_patomic skip the QEMU-emulated C build
      # (the most expensive step); the first cp311 build populates it otherwise
      - name: Cache patomic library
        id: cache-patomic
        uses: actions/cache@v6
        with:
          path: src/atomics2/_clib
          key: patomic-${{ matrix.arch }}-${{ hashFiles('setup.py') }}

      # builds and tests each CPython inside the arch's manylinux container
      - name: Build wheels and run tests
        uses: pypa/cibuildwheel@v4.1.0
        env:
          CIBW_BUILD: cp311-manylinux* cp312-manylinux* cp313-manylinux* cp314-manylinux*
          CIBW_ARCHS: ${{ matrix.arch }}
          CIBW_TEST_REQUIRES: pytest
          CIBW_TEST_COMMAND: pytest {project}/tests -q
          # cffi lacks prebuilt wheels on some arch/python combos; its source build needs libffi headers
          CIBW_BEFORE_TEST: yum -y install libffi-devel || apk add --no-cache libffi-dev

      # cibuildwheel copies the project into its build container, so the lib
      # built inside never reaches the host workspace; recover it from the
      # built wheel so the cache post-step has something to save
      - name: Extract patomic library from wheel for caching
        if: steps.cache-patomic.outputs.cache-hit != 'true'
        run: |
          whl=$(ls wheelhouse/*.whl | head -n 1)
          unzip -o "$whl" "atomics2/_clib/*" -d /tmp/wheel-libs
          cp /tmp/wheel-libs/atomics2/_clib/* src/atomics2/_clib/
