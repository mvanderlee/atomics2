name: on-release


on:
  release:
    types:
      - published


jobs:
  build_wheels:
    uses: ./.github/workflows/_reusable-build-wheels.yml

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # full history and tags so setuptools-scm can derive the version
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install pyproject.toml requirements
        shell: bash
        run: |
          python -m pip install toml
          python -c 'import toml; c = toml.load("pyproject.toml"); print("\n".join(c["build-system"]["requires"]))' \
            | python -m pip install -r /dev/stdin

      - name: Build sdist
        run: python setup.py sdist

      - uses: actions/upload-artifact@v7
        with:
          name: artifact-source
          path: dist/*.tar.gz

  upload_pypi:
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      # required for PyPI trusted publishing (OIDC)
      id-token: write
    steps:
      - uses: actions/upload-artifact/merge@v7
        with:
          name: artifact
          pattern: artifact-*

      - uses: actions/download-artifact@v8
        with:
          name: artifact
          path: dist

      - uses: pypa/gh-action-pypi-publish@release/v1
